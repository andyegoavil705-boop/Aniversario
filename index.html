<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Felices 4 Años ❤️</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  background: linear-gradient(to bottom,#ff758c,#ff7eb3);
  color:white;
}

.card{
  background: rgba(0,0,0,0.2);
  margin:40px 20px;
  padding:30px;
  border-radius:25px;
}

img{
  width:250px;
  border-radius:20px;
  margin-bottom:20px;
}

h1{
  font-size:28px;
}

#contador{
  font-size:24px;
  font-weight:bold;
  margin-top:20px;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<img src="foto.jpg">

<h1>Felices 4 Años ❤️</h1>
<p>Desde el 21 de Febrero del 2022</p>
<p>Gracias por estos momentos increíbles juntos, Te Amo.</p>

<div id="contador"></div>

<button onclick="reproducirMusica()">
  Reproducir música 🎵
</button>

<audio id="musica" loop>
  <source src="musica.mp3"></audio>
</audio>

</div>

<script>
const fechaInicio = new Date("2022-02-21T00:00:00");

function actualizar(){
  const ahora = new Date();
  const diferencia = ahora - fechaInicio;

  const dias = Math.floor(diferencia / (1000*60*60*24));
  const horas = Math.floor((diferencia / (1000*60*60)) % 24);
  const minutos = Math.floor((diferencia / (1000*60)) % 60);
  const segundos = Math.floor((diferencia / 1000) % 60);

  document.getElementById("contador").innerHTML =
    dias + " días " +
    horas + " horas " +
    minutos + " minutos " +
    segundos + " segundos ❤️";
}

setInterval(actualizar,1000);
actualizar();
</script>

</body>
</html>
