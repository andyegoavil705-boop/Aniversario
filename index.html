<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andy ❤️ Betty</title>

<style>
body{
  margin:0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(180deg,#ff758c,#ff7eb3);
  overflow-x:hidden;
  text-align:center;
  color:white;
}

/* Pantalla inicio */
#inicio{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
  z-index:10;
  cursor:pointer;
}

/* Nombre brillante */
.nombre{
  font-size:40px;
  font-weight:bold;
  animation:brillar 2s infinite alternate;
}

@keyframes brillar{
  from{ text-shadow:0 0 10px white; }
  to{ text-shadow:0 0 30px #fff,0 0 50px #ff0080; }
}

/* Card */
.card{
  padding:20px;
  margin-top:40px;
}

img{
  width:260px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* contador */
#contador{
  font-size:26px;
  margin-top:20px;
  font-weight:bold;
  animation:fade 1s infinite alternate;
}

@keyframes fade{
  from{opacity:0.7}
  to{opacity:1}
}

/* corazones flotando */
.heart{
  position:fixed;
  bottom:-20px;
  font-size:20px;
  animation:flotar 6s linear infinite;
}

@keyframes flotar{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(-110vh);opacity:0}
}

/* carta */
#carta{
  display:none;
  background:white;
  color:#ff4d6d;
  padding:20px;
  margin:20px;
  border-radius:15px;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  margin-top:15px;
  cursor:pointer;
}

/* mensaje escrito */
#mensaje{
  margin-top:20px;
  font-size:20px;
  min-height:40px;
}
</style>
</head>

<body>

<div id="inicio" onclick="iniciar()">
  Nuestra historia comenzó el 21 de Febrero ❤️ <br> (Toca para continuar)
</div>

<div class="card">
<img src="foto.jpg">

<h1>Felices 4 Años ❤️</h1>

<div class="nombre">BETTY ✨</div>

<p>Desde el 21 de Febrero del 2022</p>

<div id="contador"></div>

<div id="mensaje"></div>

<button onclick="mostrarCarta()">Haz clic si me amas ❤️</button>

<div id="carta">
  Betty… estos 4 años no son solo tiempo.  
  Son 1461 días demostrando que eres el amor correcto.  
  Gracias por existir en mi vida. ❤️  
</div>

<audio id="musica" loop>
  <source src="Música.mp3">
</audio>

</div>

<script>

const fechaInicio = new Date("2022-02-21T00:00:00");

function actualizar(){
  const ahora = new Date();
  const diferencia = ahora - fechaInicio;

  const dias = Math.floor(diferencia / (1000*60*60*24));
  const horas = Math.floor((diferencia / (1000*60*60)) % 24);
  const minutos = Math.floor((diferencia / (1000*60)) % 60);
  const segundos = Math.floor((diferencia / 1000) % 60);

  document.getElementById("contador").innerHTML =
  dias+" días "+horas+" horas "+minutos+" minutos "+segundos+" segundos ❤️";
}

setInterval(actualizar,1000);

/* inicio */
function iniciar(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("musica").play();
  escribirMensaje();
}

/* escribir mensaje */
const texto = "Betty, desde aquel día mi mundo dejó de ser normal y empezó a ser perfecto...";
let i=0;

function escribirMensaje(){
  if(i<texto.length){
    document.getElementById("mensaje").innerHTML+=texto.charAt(i);
    i++;
    setTimeout(escribirMensaje,50);
  }
}

/* carta */
function mostrarCarta(){
  document.getElementById("carta").style.display="block";
}

/* corazones */
setInterval(()=>{
  const heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(Math.random()*3+3)+"s";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
},500);

/* efecto al tocar */
document.addEventListener("click",function(e){
  const sparkle=document.createElement("div");
  sparkle.innerHTML="✨";
  sparkle.style.position="fixed";
  sparkle.style.left=e.clientX+"px";
  sparkle.style.top=e.clientY+"px";
  sparkle.style.fontSize="20px";
  document.body.appendChild(sparkle);
  setTimeout(()=>sparkle.remove(),800);
});

</script>

</body>
</html>
