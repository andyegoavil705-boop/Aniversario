<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andy ❤️ Betty</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#ff758c,#ff7eb3);
  overflow-x:hidden;
  text-align:center;
  color:white;
}

/* Pantalla inicio */
#inicio{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  z-index:10;
  cursor:pointer;
}

/* Nombre brillante */
.brillo{
  background: linear-gradient(90deg,#fff,#ffd700,#fff);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: brilloAnim 2s linear infinite;
}

@keyframes brilloAnim{
  to{ background-position:200% center; }
}

/* Card */
.card{
  margin-top:40px;
  padding:20px;
}

img{
  width:260px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

#contador{
  font-size:22px;
  font-weight:bold;
  margin-top:15px;
}

/* Mensaje animado */
#mensajeSorpresa{
  display:none;
  margin-top:20px;
  font-size:20px;
  opacity:0;
  transform:translateY(20px);
  transition: all 1s ease;
}

#mensajeSorpresa.mostrar{
  display:block;
  opacity:1;
  transform:translateY(0);
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:white;
  color:#ff4d6d;
  font-weight:bold;
  margin-top:15px;
  cursor:pointer;
}

/* Corazones */
.heart{
  position:fixed;
  bottom:-20px;
  font-size:20px;
  animation: flotar 6s linear infinite;
}

@keyframes flotar{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-110vh);opacity:0;}
}
</style>
</head>

<body>

<div id="inicio" onclick="iniciar()">
  Toca para comenzar ❤️
</div>

<div class="card">

<img src="foto.jpg">

<h1>Andy ❤️ <span class="brillo">Betty</span></h1>

<p>Desde el 21 de Febrero del 2022</p>

<div id="contador"></div>

<button onclick="mostrarMensaje()">Mensaje especial 💌</button>

<div id="mensajeSorpresa">
  Gracias por existir y por quedarte.
  Desde aquel 21 de febrero mi vida tiene tu nombre.
  Si estos 4 años fueron increíbles…
  no imagino lo hermosa que será toda una vida contigo ❤️
</div>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const fechaInicio = new Date("2022-02-21T00:00:00");

function actualizar(){
  const ahora = new Date();
  const diferencia = ahora - fechaInicio;

  const dias = Math.floor(diferencia / (1000*60*60*24));
  const horas = Math.floor((diferencia / (1000*60*60)) % 24);
  const minutos = Math.floor((diferencia / (1000*60)) % 60);
  const segundos = Math.floor((diferencia / 1000) % 60);

  document.getElementById("contador").innerHTML =
    dias+" días "+horas+" horas "+minutos+" minutos "+segundos+" segundos ❤️";
}

setInterval(actualizar,1000);
actualizar();

function iniciar(){
  document.getElementById("inicio").style.display="none";
  document.getElementById("musica").play();
}

function mostrarMensaje(){
  document.getElementById("mensajeSorpresa").classList.add("mostrar");
}

/* Corazones */
setInterval(()=>{
  const heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*20+15)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
},500);

</script>

</body>
</html>
